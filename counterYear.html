<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Year Counter</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Syne+Mono&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: transparent;
    font-family: 'Syne', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 16px;
  }

  .container {
    width: 100%;
    max-width: 680px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .card {
    background: #1a1a1a;
    border-radius: 12px;
    padding: 20px 24px;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }

  .card.passed::before { background: #ff4d4d; }
  .card.remaining::before { background: #4dff91; }

  .label {
    font-family: 'Syne Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #666;
    margin-bottom: 8px;
  }

  .number {
    font-size: 52px;
    font-weight: 800;
    line-height: 1;
    letter-spacing: -2px;
  }

  .card.passed .number { color: #ff4d4d; }
  .card.remaining .number { color: #4dff91; }

  .sub {
    font-family: 'Syne Mono', monospace;
    font-size: 11px;
    color: #444;
    margin-top: 8px;
  }

  .progress-bar {
    grid-column: 1 / -1;
    background: #1a1a1a;
    border-radius: 12px;
    padding: 20px 24px;
    position: relative;
    overflow: hidden;
  }

  .bar-label {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }

  .bar-label .label { margin: 0; }

  .percent {
    font-family: 'Syne Mono', monospace;
    font-size: 13px;
    color: #888;
  }

  .bar-track {
    width: 100%;
    height: 6px;
    background: #2a2a2a;
    border-radius: 3px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    border-radius: 3px;
    background: linear-gradient(90deg, #ff4d4d, #ff914d);
    transition: width 1s ease;
    position: relative;
  }

  .bar-fill::after {
    content: '';
    position: absolute;
    right: 0; top: 0; bottom: 0;
    width: 20px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15));
  }

  .message {
    grid-column: 1 / -1;
    text-align: center;
    font-family: 'Syne Mono', monospace;
    font-size: 11px;
    color: #333;
    letter-spacing: 0.08em;
    padding: 4px 0;
  }

  .message span {
    color: #555;
  }
</style>
</head>
<body>
<div class="container">
  <div class="card passed">
    <div class="label">Jours écoulés</div>
    <div class="number" id="passed">—</div>
    <div class="sub" id="passed-sub">— semaines</div>
  </div>

  <div class="card remaining">
    <div class="label">Jours restants</div>
    <div class="number" id="remaining">—</div>
    <div class="sub" id="remaining-sub">— semaines</div>
  </div>

  <div class="progress-bar">
    <div class="bar-label">
      <div class="label">Progression <span id="year">2026</span></div>
      <div class="percent" id="percent">—%</div>
    </div>
    <div class="bar-track">
      <div class="bar-fill" id="bar" style="width: 0%"></div>
    </div>
  </div>

  <div class="message" id="message"></div>
</div>

<script>
  function compute() {
    const now = new Date();
    const year = now.getFullYear();
    const start = new Date(year, 0, 1);
    const end = new Date(year + 1, 0, 1);
    const total = (end - start) / 86400000;
    const passed = Math.floor((now - start) / 86400000);
    const remaining = total - passed;
    const pct = (passed / total * 100).toFixed(1);

    document.getElementById('passed').textContent = passed;
    document.getElementById('remaining').textContent = remaining;
    document.getElementById('passed-sub').textContent = Math.floor(passed / 7) + ' semaines';
    document.getElementById('remaining-sub').textContent = Math.floor(remaining / 7) + ' semaines';
    document.getElementById('percent').textContent = pct + '%';
    document.getElementById('year').textContent = year;
    document.getElementById('bar').style.width = pct + '%';

    const messages = [
      { max: 10, text: "L'année vient de commencer. Pose les bases." },
      { max: 25, text: "Premier trimestre. Les habitudes se forment maintenant." },
      { max: 50, text: "Mi-parcours. Est-ce que tu tiens le rythme ?" },
      { max: 75, text: "Troisième trimestre. Reste constant." },
      { max: 90, text: "Ligne droite finale. Ne lâche rien." },
      { max: 100, text: "Dernière ligne droite. Finis fort." },
    ];

    const msg = messages.find(m => pct <= m.max) || messages[messages.length - 1];
    document.getElementById('message').innerHTML = `<span>${msg.text}</span>`;
  }

  compute();
  setInterval(compute, 60000);
</script>
</body>
</html>

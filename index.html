<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Year Progress 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;700;800&family=Syne+Mono:wght@400;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg: #0d0f12;
      --card: #16181e;
      --text: #e2e8f0;
      --text-dim: #94a3b8;
      --accent-passed: #f87171;
      --accent-remain: #4ade80;
      --gradient-bar: linear-gradient(90deg, #f87171, #fb923c, #fbbf24);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', system-ui, sans-serif;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: 20px;
      background-image: 
        radial-gradient(circle at 15% 50%, rgba(248,113,113,0.04) 0%, transparent 25%),
        radial-gradient(circle at 85% 30%, rgba(74,222,128,0.04) 0%, transparent 35%);
    }

    .container {
      width: 100%;
      max-width: 720px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
    }

    .card {
      background: var(--card);
      border-radius: 16px;
      padding: 28px 32px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 10px 30px -10px rgba(0,0,0,0.6);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 40px -15px rgba(0,0,0,0.7);
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0 0 auto 0;
      height: 3px;
      background: var(--gradient-bar);
      opacity: 0.8;
    }

    .card.passed::before  { background: var(--accent-passed); }
    .card.remaining::before { background: var(--accent-remain); }

    .label {
      font-family: 'Syne Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 10px;
    }

    .number {
      font-size: clamp(3.8rem, 12vw, 5.8rem);
      font-weight: 800;
      line-height: 0.92;
      letter-spacing: -3px;
    }

    .card.passed .number { color: var(--accent-passed); }
    .card.remaining .number { color: var(--accent-remain); }

    .sub {
      font-family: 'Syne Mono', monospace;
      font-size: 13px;
      color: #475569;
      margin-top: 10px;
      font-weight: 400;
    }

    .progress-section {
      grid-column: 1 / -1;
      background: var(--card);
      border-radius: 16px;
      padding: 28px 32px;
      box-shadow: 0 10px 30px -10px rgba(0,0,0,0.6);
    }

    .bar-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 16px;
    }

    .bar-header .label {
      margin: 0;
      font-size: 13px;
    }

    .percent {
      font-family: 'Syne Mono', monospace;
      font-size: 15px;
      font-weight: 700;
      color: var(--text-dim);
    }

    .bar-track {
      height: 10px;
      background: #1e293b;
      border-radius: 5px;
      overflow: hidden;
      box-shadow: inset 0 1px 3px rgba(0,0,0,0.4);
    }

    .bar-fill {
      height: 100%;
      width: 0%;
      background: var(--gradient-bar);
      border-radius: 5px;
      transition: width 1.2s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
    }

    .bar-fill::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.18), transparent);
      animation: shine 3s infinite linear;
    }

    @keyframes shine {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(300%); }
    }

    .message {
      grid-column: 1 / -1;
      text-align: center;
      font-family: 'Syne Mono', monospace;
      font-size: 13px;
      color: #64748b;
      letter-spacing: 0.06em;
      margin-top: 12px;
      line-height: 1.5;
    }

    .message span {
      color: #cbd5e1;
      font-weight: 500;
    }

    @media (max-width: 500px) {
      .container { gap: 12px; }
      .card, .progress-section { padding: 24px 20px; }
      .number { font-size: clamp(3.2rem, 10vw, 4.8rem); }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="card passed">
    <div class="label">Jours écoulés</div>
    <div class="number" id="passed">—</div>
    <div class="sub" id="passed-sub">— semaines</div>
  </div>

  <div class="card remaining">
    <div class="label">Jours restants</div>
    <div class="number" id="remaining">—</div>
    <div class="sub" id="remaining-sub">— semaines</div>
  </div>

  <div class="progress-section">
    <div class="bar-header">
      <div class="label">Progression <span id="year">2026</span></div>
      <div class="percent" id="percent">—%</div>
    </div>
    <div class="bar-track">
      <div class="bar-fill" id="bar"></div>
    </div>
  </div>

  <div class="message" id="message"></div>
</div>

<script>
  function updateYearProgress() {
    const now = new Date();
    const year = now.getFullYear();
    const start = new Date(year, 0, 1);
    const end   = new Date(year + 1, 0, 1);

    const msTotal     = end - start;
    const msPassed    = now - start;
    const daysTotal   = msTotal   / 86400000;
    const daysPassed  = Math.floor(msPassed / 86400000);
    const daysLeft    = Math.floor(daysTotal - daysPassed);

    const pct = (daysPassed / daysTotal) * 100;
    const pctRounded = pct.toFixed(1);

    document.getElementById('passed').textContent    = daysPassed;
    document.getElementById('remaining').textContent = daysLeft;
    document.getElementById('passed-sub').textContent   = Math.floor(daysPassed / 7) + ' semaines';
    document.getElementById('remaining-sub').textContent = Math.floor(daysLeft   / 7) + ' semaines';

    document.getElementById('year').textContent   = year;
    document.getElementById('percent').textContent = pctRounded + '%';
    document.getElementById('bar').style.width = pct + '%';

    // Messages motivants
    const messages = [
      { max: 10,  text: "L'année démarre tout juste — pose des fondations solides." },
      { max: 25,  text: "Q1 en cours — les habitudes d'aujourd'hui font l'année de demain." },
      { max: 50,  text: "Mi-parcours — tiens le cap, tu es dans le bon rythme ?" },
      { max: 75,  text: "Q3 — la constance paie maintenant plus que jamais." },
      { max: 90,  text: "Ligne droite — accélère, ne lâche rien !" },
      { max: 100, text: "Derniers mètres — termine cette année en force !" }
    ];

    const msg = messages.find(m => pct <= m.max) || messages[messages.length - 1];
    document.getElementById('message').innerHTML = `<span>${msg.text}</span>`;
  }

  updateYearProgress();
  setInterval(updateYearProgress, 60000); // mise à jour toutes les minutes
</script>
</body>
</html>
